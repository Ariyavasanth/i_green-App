# Keep Gradle below the available RAM so the JVM retains enough native memory.
org.gradle.jvmargs=-Xmx2G -XX:MaxMetaspaceSize=1G -XX:ReservedCodeCacheSize=256m -XX:+HeapDumpOnOutOfMemoryError
android.useAndroidX=true

# Limit concurrent compiler processes on memory-constrained development machines.
org.gradle.workers.max=2
org.gradle.parallel=false
kotlin.compiler.execution.strategy=in-process

# Pub packages are on C: while this project is on E:, which breaks relocatable incremental caches.
kotlin.incremental=false
